<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2026 ACA subsidy — Tampa, family of 4, 200% FPL | CoverClarity</title>
<link rel="stylesheet" href="styles/system.css" />
<style>
  .breadcrumb { display:flex; flex-wrap:wrap; gap:7px; font-size:.84rem; color:var(--quiet); align-items:center; }
  .breadcrumb a { color:var(--quiet); text-decoration:none; }
  .breadcrumb a:hover { color:var(--accent-deep); }
  .answer-card { background:var(--card); border:1px solid var(--line); border-left:4px solid var(--accent); border-radius:var(--r-lg); box-shadow:var(--shadow); padding:28px 30px; }
  .answer-figs { display:flex; flex-wrap:wrap; gap:14px; margin-top:18px; }
  .afig { flex:1 1 200px; border-radius:var(--r); padding:16px 18px; }
  .faq-q { width:100%; text-align:left; background:none; border:none; padding:18px 0; font-family:var(--serif); font-weight:600; font-size:1.15rem; color:var(--ink); cursor:pointer; display:flex; justify-content:space-between; gap:16px; align-items:center; }
  .faq-item { border-top:1px solid var(--line); }
  .related { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .rcard { display:block; text-decoration:none; color:inherit; padding:16px 18px; border:1px solid var(--line); border-radius:var(--r); background:var(--card); transition:border-color .15s; }
  .rcard:hover { border-color:var(--accent); color:inherit; }
  .layout { display:grid; grid-template-columns: minmax(0,1fr) 300px; gap:36px; align-items:start; }
  .side-ad { position:sticky; top:90px; }
  @media (max-width: 980px){ .footgrid { grid-template-columns:1fr !important; } .layout { grid-template-columns:1fr; } .side-ad{ display:none; } .related{ grid-template-columns:1fr; } .calc-grid{ grid-template-columns:1fr !important;} .cmp-cards{grid-template-columns:1fr !important;} .mainnav{display:none !important;} .afig{flex-basis:100%;} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="js/aca-engine.js"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" src="components/result.jsx"></script>
<script type="text/babel" src="components/calculator.jsx"></script>

<script type="text/babel" data-presets="react">
function Faq({ q, a }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div className="faq-item">
      <button className="faq-q" aria-expanded={open} onClick={() => setOpen(o=>!o)}>
        <span>{q}</span>
        <span style={{ color:"var(--accent-deep)", transform: open?"rotate(45deg)":"none", transition:".2s", fontSize:"1.4rem", lineHeight:1, flex:"none" }}>+</span>
      </button>
      {open && <div style={{ paddingBottom:18, color:"var(--ink-soft)", fontSize:"1rem", lineHeight:1.65, maxWidth:"68ch" }}>{a}</div>}
    </div>
  );
}

function Spoke() {
  return (
    <React.Fragment>
      <Header active="Florida metros" />
      <main className="wrap" style={{ paddingTop: 26 }}>
        <nav className="breadcrumb" aria-label="Breadcrumb">
          <a href="metro.html">Florida ACA subsidy</a><span>›</span>
          <a href="metro.html">Tampa–St. Petersburg</a><span>›</span>
          <a href="spoke.html">Family of 4</a><span>›</span>
          <span style={{ color:"var(--ink-soft)", fontWeight:600 }}>200% of poverty level</span>
        </nav>

        <div className="layout" style={{ marginTop: 22 }}>
          <div>
            <p className="eyebrow" style={{ marginBottom:10 }}>Tampa · Family of 4 · ~$64,300/yr</p>
            <h1 className="h1" style={{ marginBottom:18, maxWidth:"20ch" }}>2026 ACA subsidy for a Tampa family of four at 200% of the poverty level</h1>

            {/* DIRECT ANSWER BLOCK — designed to be quoted out of context */}
            <div className="answer-card">
              <div className="chip chip-accent" style={{ marginBottom:14 }}><Icon name="spark" size={14}/> Direct answer</div>
              <p style={{ fontSize:"1.18rem", lineHeight:1.55, margin:0, color:"var(--ink)" }}>
                A <b>family of four in Tampa, Florida</b> earning about <b className="tnum">$64,300</b> a year (200% of the federal poverty level) would pay roughly <b className="tnum" style={{ color:"var(--favorable-deep)" }}>$107/month</b> for the benchmark Silver plan <b>with</b> the enhanced premium tax credits, versus about <b className="tnum" style={{ color:"var(--increase-deep)" }}>$349/month</b> <b>without</b> them under current law — about <b className="tnum">$242 more per month</b>.
              </p>
              <div className="answer-figs">
                <div className="afig" style={{ background:"var(--favorable-tint)", border:"1px solid var(--favorable-line)" }}>
                  <ColTag kind="fav">With enhanced credits</ColTag>
                  <div className="tnum" style={{ fontFamily:"var(--serif)", fontWeight:600, fontSize:"2rem", color:"var(--favorable-deep)", marginTop:6 }}>$107<span style={{ fontSize:".5em", color:"var(--quiet)", fontFamily:"var(--sans)" }}>/mo</span></div>
                </div>
                <div className="afig" style={{ background:"var(--increase-tint)", border:"1px solid var(--increase-line)" }}>
                  <ColTag kind="inc">Without (current law)</ColTag>
                  <div className="tnum" style={{ fontFamily:"var(--serif)", fontWeight:600, fontSize:"2rem", color:"var(--increase-deep)", marginTop:6 }}>$349<span style={{ fontSize:".5em", color:"var(--quiet)", fontFamily:"var(--sans)" }}>/mo</span></div>
                </div>
              </div>
              <div style={{ marginTop:16, display:"flex", flexWrap:"wrap", gap:12, alignItems:"center", justifyContent:"space-between" }}>
                <EstimateChip />
                <DateStamp />
              </div>
            </div>

            {/* EMBEDDED PREFILLED CALCULATOR */}
            <div style={{ marginTop:30 }}>
              <h2 className="h2" style={{ marginBottom:6 }}>Adjust for your own household</h2>
              <p className="muted" style={{ marginTop:0, marginBottom:16, maxWidth:"60ch" }}>This calculator is pre-filled for this profile. Change any field to see your own estimate.</p>
              <Calculator initial={{ metro:"tampa", size:4, ages:[40,38,10,8], income:64300 }} startOpen={true} regime="expired" layout="cards" showAd={false} embedded={true} />
            </div>

            {/* PAGE-SPECIFIC CONTEXT */}
            <div style={{ marginTop:30 }}>
              <h2 className="h2" style={{ marginBottom:10 }}>What changed for this family in 2026</h2>
              <p style={{ color:"var(--ink-soft)", maxWidth:"68ch" }}>
                Last year, this same Tampa family paid close to <b className="tnum">$107 a month</b> because the enhanced credits capped their share of income at 2%. Under current law, the older rules raise their expected contribution to about 6.5% of income — roughly <b className="tnum">$242 more each month</b> for the same benchmark plan.
              </p>
              <p style={{ color:"var(--ink-soft)", maxWidth:"68ch" }}>
                Because their income is under 250% of the poverty level, they also qualify for <b>cost-sharing reductions</b> on Silver plans — lower deductibles and copays — under either set of rules. That extra help does not appear as a lower premium; it kicks in when they use care.
              </p>
            </div>

            {/* FAQ */}
            <div style={{ marginTop:30 }}>
              <h2 className="h2" style={{ marginBottom:8 }}>Common questions</h2>
              <div>
                <Faq q="How much is health insurance for a family of 4 in Tampa in 2026?" a="At about 200% of the federal poverty level (around $64,300/year), the benchmark Silver plan costs roughly $107/month with the enhanced premium tax credits and about $349/month under current law. Your actual price depends on the exact plan, ages, and confirmed income at HealthCare.gov." />
                <Faq q="Why did my premium go up for 2026?" a="The enhanced premium tax credits expired December 31, 2025. Without them, the older subsidy rules ask households to pay a larger share of income toward the benchmark plan, so the net premium rises even when the plan's sticker price is unchanged." />
                <Faq q="Do we qualify for extra savings at this income?" a="Yes. Below 250% of the poverty level, choosing a Silver plan adds cost-sharing reductions — lower deductibles, copays, and out-of-pocket maximums — at no additional premium." />
                <Faq q="Is this an official quote?" a="No. These are estimates for planning. Confirm your plan options and exact pricing by creating an account at HealthCare.gov during Open Enrollment." />
              </div>
            </div>

            {/* RELATED */}
            <div style={{ marginTop:34 }}>
              <h2 className="h2" style={{ marginBottom:14 }}>Related estimates</h2>
              <div className="related">
                <a className="rcard" href="spoke.html"><div className="caption" style={{marginBottom:4}}>Same family, lower income</div><b>Tampa · family of 4 · 150% FPL</b></a>
                <a className="rcard" href="spoke.html"><div className="caption" style={{marginBottom:4}}>Same income, fewer people</div><b>Tampa · couple · 200% FPL</b></a>
                <a className="rcard" href="spoke.html"><div className="caption" style={{marginBottom:4}}>Nearby metro</div><b>Orlando · family of 4 · 200% FPL</b></a>
              </div>
              <div className="row-wrap" style={{ marginTop:16 }}>
                <a className="btn btn-ghost" href="metro.html"><Icon name="map" size={16}/> All Tampa estimates</a>
                <a className="btn btn-ghost" href="index.html"><Icon name="calc" size={16}/> Florida calculator</a>
              </div>
            </div>

            <div className="adslot" style={{ marginTop:28 }}><span className="adnote">In-content responsive ad · below the answer & tool</span></div>

            <div style={{ marginTop:26, paddingTop:18, borderTop:"1px solid var(--line)" }}>
              <SourceRow />
            </div>
          </div>

          {/* SIDEBAR AD (wide desktop only) */}
          <aside>
            <div className="side-ad">
              <div className="adslot" style={{ minHeight:600 }}><span className="adnote">Sidebar ad<br/>300×600</span></div>
              <div style={{ marginTop:16 }}><ReviewerChip /></div>
            </div>
          </aside>
        </div>
      </main>
      <Footer />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Spoke />);
</script>
</body>
</html>
