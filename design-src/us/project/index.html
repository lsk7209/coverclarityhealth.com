<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CoverClarity — See your 2026 Florida health insurance cost, with & without the enhanced subsidies</title>
<link rel="stylesheet" href="styles/system.css" />
<style>
  /* page-specific */
  .hero { padding: 46px 0 30px; }
  .hero .eyebrow { display:flex; align-items:center; gap:10px; justify-content:center; }
  .hero-h1 { text-align:center; max-width: 16ch; margin: 14px auto 0; }
  .hero-sub { text-align:center; max-width: 60ch; margin: 16px auto 0; }
  .hero-chips { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top: 20px; }
  .calc-shell { max-width: 980px; margin: 14px auto 0; }
  .steps { display:grid; grid-template-columns: repeat(3,1fr); gap: 22px; }
  .step-num { width:30px;height:30px;border-radius:50%;background:var(--accent-tint);color:var(--accent-deep);display:grid;place-items:center;font-weight:700;font-family:var(--serif);flex:none; }
  .cluster { display:grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
  .gcard { display:block; text-decoration:none; color:inherit; padding: 22px; border-radius: var(--r-lg); background: var(--card); border:1px solid var(--line); transition: border-color .15s, transform .15s, box-shadow .15s; }
  .gcard:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); color: inherit; }
  .trustband { background: var(--paper-2); border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  @media (max-width: 820px){
    .steps, .cluster { grid-template-columns: 1fr; }
    .mainnav { display:none !important; }
    .cmp-cards { grid-template-columns: 1fr !important; }
    .calc-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 980px){ .footgrid { grid-template-columns: 1fr !important; gap: 28px !important; } }
</style>
</head>
<body>
<a href="#calc" class="skip-link">Skip to calculator</a>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="js/aca-engine.js"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" src="components/result.jsx"></script>
<script type="text/babel" src="components/calculator.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react">
const ACCENTS = {
  ochre: { a:"#C8862B", deep:"#A66C1C", tint:"#F4E7CE", wash:"#FBF3E1" },
  teal:  { a:"#2C7A70", deep:"#1F5E56", tint:"#D8EAE6", wash:"#EAF4F1" },
  clay:  { a:"#B5673C", deep:"#94512C", tint:"#F2E1D6", wash:"#F8EEE6" },
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "regime": "expired",
  "layout": "cards",
  "accent": "ochre"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const c = ACCENTS[t.accent] || ACCENTS.ochre;
    const r = document.documentElement.style;
    r.setProperty("--accent", c.a); r.setProperty("--accent-deep", c.deep);
    r.setProperty("--accent-tint", c.tint); r.setProperty("--accent-wash", c.wash);
  }, [t.accent]);

  return (
    <React.Fragment>
      <Header active="Calculator" />

      <main>
        {/* HERO + CALCULATOR */}
        <section className="hero">
          <div className="wrap">
            <div className="eyebrow"><span className="kicker-line"></span> Florida · Plan Year 2026 <span className="kicker-line"></span></div>
            <h1 className="display hero-h1">See your 2026 Florida health insurance cost</h1>
            <p className="lead hero-sub">A plain-language estimate of your monthly Marketplace premium — <b>with</b> the enhanced subsidies and <b>without</b> them, side by side. The enhanced credits expired Dec 31, 2025; here's what that means for you.</p>
            <div className="hero-chips">
              <span className="chip"><Icon name="lock" size={14} /> Nothing saved or sent</span>
              <span className="chip"><Icon name="clock" size={14} /> Updated Jun 5, 2026</span>
              <span className="chip"><Icon name="check" size={14} /> No sign-up, no quote calls</span>
            </div>
          </div>

          <div className="wrap-wide" id="calc">
            <div className="calc-shell" style={{ marginTop: 26 }}>
              <Calculator regime={t.regime} layout={t.layout} startOpen={true} />
            </div>
          </div>
        </section>

        {/* HOW THIS WORKS */}
        <section className="wrap" style={{ marginTop: 64 }}>
          <h2 className="h2 center" style={{ marginBottom: 6 }}>How this works</h2>
          <p className="center muted" style={{ maxWidth: "52ch", margin: "0 auto 30px" }}>Three short steps. We never ask for your name, email, or Social Security number.</p>
          <div className="steps">
            {[["map","Tell us where & who","Your Florida county and the ages of everyone who needs coverage set your benchmark plan."],
              ["calc","Add your 2026 income","We compare it to the federal poverty level to find your tax credit under each set of rules."],
              ["scale","See both regimes","Your monthly premium with the enhanced credits and under current law — clearly, side by side."]].map((s,i)=>(
              <div key={i} className="row" style={{ alignItems:"flex-start", gap:14 }}>
                <span className="step-num">{i+1}</span>
                <div>
                  <div className="row" style={{ gap:8, marginBottom:4 }}><span style={{color:"var(--accent-deep)"}}><Icon name={s[0]} size={18}/></span><b style={{fontSize:"1.02rem"}}>{s[1]}</b></div>
                  <p className="muted" style={{ margin:0, fontSize:".95rem" }}>{s[2]}</p>
                </div>
              </div>
            ))}
          </div>
        </section>

        {/* TRUST BAND */}
        <section className="trustband" style={{ marginTop: 56 }}>
          <div className="wrap" style={{ padding:"26px 28px", display:"flex", flexWrap:"wrap", gap:"18px 40px", alignItems:"center", justifyContent:"space-between" }}>
            <div className="stack" style={{"--gap":"10px"}}>
              <SourceRow />
              <DateStamp />
            </div>
            <ReviewerChip />
          </div>
        </section>

        {/* NEWS / GUIDE CLUSTER */}
        <section className="wrap" style={{ marginTop: 56 }}>
          <div className="spread" style={{ marginBottom: 20, flexWrap:"wrap", gap:10 }}>
            <h2 className="h2">Understand the 2026 changes</h2>
            <a href="blog.html" className="btn btn-ghost">All news & guides <Icon name="arrow" size={16}/></a>
          </div>
          <div className="cluster">
            {[["doc","Policy status","Will the enhanced subsidies come back? What's happening in Congress, updated as it moves."],
              ["book","The subsidy cliff, explained","Why earning $1 over 400% of poverty could cost thousands under current law."],
              ["users","Florida's coverage gap","Earning too little for a subsidy in a non-expansion state — and where to get help."]].map((c,i)=>(
              <a key={i} className="gcard" href="article.html">
                <span style={{color:"var(--accent-deep)"}}><Icon name={c[0]} size={22}/></span>
                <h3 className="h3" style={{ margin:"12px 0 7px", fontSize:"1.16rem" }}>{c[1]}</h3>
                <p className="muted" style={{ margin:0, fontSize:".93rem" }}>{c[2]}</p>
                <div style={{ marginTop:12, color:"var(--accent-deep)", fontWeight:600, fontSize:".9rem", display:"inline-flex", gap:6, alignItems:"center" }}>Read <Icon name="arrow" size={15}/></div>
              </a>
            ))}
          </div>
        </section>
      </main>

      <Footer />

      <TweaksPanel>
        <TweakSection label="Policy-status regime" />
        <TweakRadio label="Current law" value={t.regime}
          options={["expired","extended","compromise"]}
          onChange={(v)=>setTweak("regime", v)} />
        <TweakSection label="Result comparison" />
        <TweakRadio label="Layout" value={t.layout}
          options={["cards","bars","ledger"]}
          onChange={(v)=>setTweak("layout", v)} />
        <TweakSection label="Brand accent" />
        <TweakRadio label="Accent" value={t.accent}
          options={["ochre","teal","clay"]}
          onChange={(v)=>setTweak("accent", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
