<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>News & guides — 2026 ACA changes for Florida | CoverClarity</title>
<link rel="stylesheet" href="styles/system.css" />
<style>
  .cats { display:flex; flex-wrap:wrap; gap:8px; }
  .cat { font-family:var(--sans); font-weight:600; font-size:.85rem; padding:7px 14px; border-radius:100px;
    border:1px solid var(--line-2); background:var(--card); color:var(--ink-soft); cursor:pointer; transition:.14s; }
  .cat:hover { border-color:var(--accent); color:var(--accent-deep); }
  .cat[aria-pressed="true"] { background:var(--ink); border-color:var(--ink); color:#fff; }
  .feature { display:grid; grid-template-columns:1.15fr 1fr; gap:28px; align-items:center;
    background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--shadow); padding:30px 32px; }
  .feature .thumb { aspect-ratio:4/3; border-radius:var(--r); background:
    radial-gradient(120% 120% at 80% 10%, var(--accent-tint), transparent 60%), var(--paper-2);
    border:1px solid var(--line); display:grid; place-items:center; color:var(--accent-deep); }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .post { display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg); overflow:hidden; transition:.15s; }
  .post:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow); color:inherit; }
  .post .pthumb { aspect-ratio:16/9; background:var(--paper-2); display:grid; place-items:center; color:var(--quiet); border-bottom:1px solid var(--line); }
  .post .pbody { padding:18px 20px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .tag { align-self:flex-start; font-size:.72rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
    color:var(--accent-deep); }
  .freshness { display:inline-flex; align-items:center; gap:6px; font-size:.78rem; color:var(--favorable-deep); font-weight:600; }
  @media (max-width: 900px){ .grid { grid-template-columns:1fr 1fr; } .feature { grid-template-columns:1fr; } .feature .thumb{ order:-1; } }
  @media (max-width: 620px){ .grid { grid-template-columns:1fr; } }
  @media (max-width: 980px){ .footgrid { grid-template-columns:1fr !important; } .mainnav{display:none !important;} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" data-presets="react">
const CATS = ["All", "Policy status", "Premium shock", "Open enrollment", "Metal tiers", "CSR", "Subsidy cliff"];
const POSTS = [
  { tag:"Premium shock", icon:"calc", title:"Why your 2026 premium went up even though your plan didn't change", dek:"The credit shrank, not the plan. Here's the mechanism in plain language.", date:"Jun 3, 2026", fresh:true },
  { tag:"Subsidy cliff", icon:"scale", title:"The subsidy cliff, explained: the $1 that can cost you thousands", dek:"Above 400% of poverty under current law, premium help drops to zero.", date:"May 28, 2026" },
  { tag:"CSR", icon:"spark", title:"Cost-sharing reductions: the Silver-plan savings many people miss", dek:"Under 250% FPL, Silver plans quietly lower your deductible and copays.", date:"May 21, 2026" },
  { tag:"Open enrollment", icon:"clock", title:"2026 Open Enrollment dates and deadlines for Florida", dek:"When to enroll, what counts as a qualifying life event, and key cutoffs.", date:"May 14, 2026" },
  { tag:"Metal tiers", icon:"book", title:"Bronze, Silver, Gold: which metal tier actually saves you money?", dek:"Why the cheapest premium is rarely the cheapest plan overall.", date:"May 7, 2026" },
  { tag:"Policy status", icon:"users", title:"Florida's Medicaid coverage gap: who falls in, and where to get help", dek:"In a non-expansion state, earning too little can mean no subsidy at all.", date:"Apr 30, 2026" },
];

function Blog() {
  const [cat, setCat] = React.useState("All");
  const visible = POSTS.filter(p => cat === "All" || p.tag === cat);
  return (
    <React.Fragment>
      <Header active="News & guides" />
      <main className="wrap" style={{ paddingTop: 34 }}>
        <p className="eyebrow">News &amp; guides</p>
        <h1 className="h1" style={{ margin:"12px 0 12px", maxWidth:"18ch" }}>Making sense of the 2026 ACA changes</h1>
        <p className="lead" style={{ maxWidth:"60ch" }}>Plain-language explainers and policy updates for Florida Marketplace shoppers. Every piece is dated, sourced, and reviewed for accuracy.</p>

        <div style={{ display:"flex", flexWrap:"wrap", gap:14, alignItems:"center", justifyContent:"space-between", margin:"24px 0 26px" }}>
          <div className="cats" role="group" aria-label="Filter by topic">
            {CATS.map(c => <button key={c} className="cat" aria-pressed={cat===c} onClick={()=>setCat(c)}>{c}</button>)}
          </div>
          <ReviewerChip />
        </div>

        {/* FEATURED (only when not filtered away) */}
        {(cat === "All" || cat === "Policy status") && (
          <a href="article.html" className="feature" style={{ textDecoration:"none", color:"inherit", marginBottom:30 }}>
            <div>
              <div className="row" style={{ gap:10, marginBottom:12 }}>
                <span className="tag">Policy status</span>
                <span className="freshness"><Icon name="clock" size={13}/> Updated weekly</span>
              </div>
              <h2 className="h2" style={{ marginBottom:10 }}>Will the enhanced ACA subsidies come back? Where 2026 stands</h2>
              <p className="muted" style={{ margin:"0 0 16px", maxWidth:"52ch" }}>The enhanced credits expired Dec 31, 2025. We track the live debate and what it means for your premium — updated as Congress moves.</p>
              <div className="datestamp tnum" style={{ marginBottom:14 }}><span><b>Published</b> May 2, 2026</span><span><b>Last reviewed</b> Jun 5, 2026</span></div>
              <span className="btn btn-primary">Read the update <Icon name="arrow" size={16}/></span>
            </div>
            <div className="thumb"><Icon name="doc" size={56}/></div>
          </a>
        )}

        <div className="adslot" style={{ marginBottom:28 }}><span className="adnote">Leaderboard ad · 728×90 — between sections, clear of content</span></div>

        <div className="grid">
          {visible.map((p,i) => (
            <a key={i} href="article.html" className="post">
              <div className="pthumb"><Icon name={p.icon} size={40}/></div>
              <div className="pbody">
                <span className="tag">{p.tag}</span>
                <h3 className="h3" style={{ fontSize:"1.12rem", lineHeight:1.22 }}>{p.title}</h3>
                <p className="muted" style={{ margin:0, fontSize:".92rem", flex:1 }}>{p.dek}</p>
                <div className="spread" style={{ marginTop:6 }}>
                  <span className="caption tnum">{p.date}</span>
                  {p.fresh
                    ? <span className="freshness"><Icon name="check" size={13}/> Just updated</span>
                    : <span className="caption" style={{ display:"inline-flex", alignItems:"center", gap:5 }}><Icon name="shield" size={13}/> Reviewed</span>}
                </div>
              </div>
            </a>
          ))}
        </div>

        {/* CTA */}
        <div style={{ background:"var(--ink)", color:"#fff", borderRadius:"var(--r-lg)", padding:"28px 30px", margin:"34px 0 0",
          display:"flex", alignItems:"center", justifyContent:"space-between", gap:20, flexWrap:"wrap" }}>
          <div>
            <div style={{ fontFamily:"var(--serif)", fontWeight:600, fontSize:"1.3rem", marginBottom:6 }}>Reading about premiums? See your own number.</div>
            <div style={{ color:"rgba(255,255,255,.78)", fontSize:".95rem" }}>Free, private, no sign-up — with and without the enhanced credits.</div>
          </div>
          <a className="btn btn-primary" href="index.html">Open the calculator <Icon name="arrow" size={16}/></a>
        </div>

        <div style={{ marginTop:28, paddingTop:18, borderTop:"1px solid var(--line)" }}>
          <SourceRow />
        </div>
      </main>
      <Footer />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Blog />);
</script>
</body>
</html>
