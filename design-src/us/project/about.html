<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>About & editorial standards | CoverClarity</title>
<link rel="stylesheet" href="styles/system.css" />
<style>
  .doc { max-width: 760px; margin: 0 auto; }
  .doc p { color: var(--ink-soft); margin: 0 0 1.05em; }
  .doc h2 { margin: 36px 0 12px; scroll-margin-top: 90px; }
  .indep { background: var(--accent-wash); border:1px solid #E8D2A6; border-radius:var(--r-lg); padding:24px 28px; }
  .reviewer-block { display:flex; gap:18px; align-items:flex-start; background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg); padding:24px 26px; box-shadow:var(--shadow-sm); }
  .reviewer-block .ava { width:64px;height:64px;border-radius:50%;background:var(--accent-tint);color:var(--accent-deep);display:grid;place-items:center;font-weight:700;font-family:var(--serif);font-size:1.5rem;flex:none; }
  .process { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  .pcard { border:1px solid var(--line); border-radius:var(--r); padding:18px 20px; background:var(--card); }
  @media (max-width: 820px){ .process { grid-template-columns:1fr; } }
  @media (max-width: 980px){ .footgrid { grid-template-columns:1fr !important; } .mainnav{display:none !important;} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" data-presets="react">
function About() {
  return (
    <React.Fragment>
      <Header active="About" />
      <main className="wrap" style={{ paddingTop: 30 }}>
        <div className="doc">
          <p className="eyebrow">About & editorial standards</p>
          <h1 className="h1" style={{ margin:"12px 0 14px" }}>Who we are, and how we keep this accurate</h1>
          <p className="lead" style={{ color:"var(--ink)" }}>CoverClarity is an independent consumer-information site. We help Floridians understand ACA Marketplace premiums and subsidies in plain language.</p>

          <div className="indep" style={{ margin:"24px 0" }}>
            <div className="row" style={{ gap:10, marginBottom:8 }}><span style={{color:"var(--accent-deep)"}}><Icon name="shield" size={20}/></span><b style={{ fontSize:"1.05rem" }}>Our independence</b></div>
            <p style={{ margin:0 }}>CoverClarity is <b>not affiliated with the U.S. government, HealthCare.gov, or any insurance company</b>. We are not a broker and do not sell insurance, capture leads, or earn commissions on enrollment. The site is supported by clearly labeled advertising, kept separate from our tools and editorial content.</p>
          </div>

          <h2 className="h2">Our editorial process</h2>
          <div className="process">
            <div className="pcard"><b>Sourced from primary data</b><p style={{ margin:"6px 0 0", fontSize:".95rem" }}>Estimates and explanations are built on CMS, IRS, and HHS data — cited on every relevant page.</p></div>
            <div className="pcard"><b>Reviewed for accuracy</b><p style={{ margin:"6px 0 0", fontSize:".95rem" }}>A licensed health-insurance professional reviews our methodology and consumer guidance.</p></div>
            <div className="pcard"><b>Dated and updated</b><p style={{ margin:"6px 0 0", fontSize:".95rem" }}>Every page carries publish and review dates; policy-sensitive pages are updated when the law changes.</p></div>
            <div className="pcard"><b>Plain language</b><p style={{ margin:"6px 0 0", fontSize:".95rem" }}>We write at a 7th–8th grade reading level and define every acronym on first use.</p></div>
          </div>

          <h2 className="h2" id="reviewer">Our reviewer</h2>
          <div className="reviewer-block">
            <span className="ava">DM</span>
            <div>
              <div style={{ fontFamily:"var(--serif)", fontWeight:600, fontSize:"1.25rem" }}>Diane Marsh</div>
              <div style={{ color:"var(--accent-deep)", fontWeight:600, fontSize:".92rem", marginBottom:8 }}>Licensed Health Insurance Counselor (FL) · 14 years in ACA Marketplace coverage</div>
              <p style={{ margin:0, fontSize:".96rem" }}>Diane reviews CoverClarity's methodology and consumer guidance for accuracy. She <b>does not provide individualized advice</b> through this site and is not compensated based on any enrollment.</p>
            </div>
          </div>

          <h2 className="h2" id="corrections">Contact & corrections</h2>
          <p>Found something that looks wrong? We want to fix it. Email <a href="mailto:corrections@coverclarity.example">corrections@coverclarity.example</a>. We review every report, correct errors promptly, and note material corrections with the date. Getting the law right matters more than being first — <b>we update this when the law changes.</b></p>

          <div style={{ marginTop:28, paddingTop:18, borderTop:"1px solid var(--line)" }}>
            <div className="nonaffil" style={{ marginBottom:10 }}><Icon name="info" size={15}/> Independent — not affiliated with the U.S. government or HealthCare.gov.</div>
            <SourceRow />
          </div>
        </div>
      </main>
      <Footer />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<About />);
</script>
</body>
</html>
